[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions."___netlify-server-handler"]
  included_files = ["runtime-tools/yt-dlp", "runtime-tools/ffmpeg"]

[functions."generate-recipe-background"]
  included_files = ["runtime-tools/yt-dlp", "runtime-tools/ffmpeg"]

[[plugins]]
  package = "@netlify/plugin-nextjs"
